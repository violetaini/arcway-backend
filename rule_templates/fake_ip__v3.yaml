mode: rule
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - tls://8.8.8.8
    - tls://1.1.1.1
  direct-nameserver:
    - https://120.53.53.53/dns-query
  nameserver-policy:
    geosite:cn:
      - 223.5.5.5
      - 119.29.29.29
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
  ipv6: false
  listen: 0.0.0.0:7874
  default-nameserver:
    - tls://1.12.12.12
  fake-ip-filter:
    - +.lan
    - +.local
    - +.example.com
proxies: null
proxy-groups:
  - name: 🚀 手动选择
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - ♻️ 自动选择
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🌠 中转节点
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    filter: 中转|CO|co
    proxies:
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
  - name: 🌄 落地节点
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    filter: LD|落地|Bage|bage|jinx|ctc|Jinx|JINX|CTC|Luodi|luodi|LUODI|zouter|legend|Alice|alice
    proxies:
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
    dialer-proxy-group: 🌠 中转节点
  - name: 🚀 GitHub
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - 🚀 手动选择
      - ♻️ 自动选择
      - 🎯 全球直连
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
  - name: 📢 谷歌FCM
