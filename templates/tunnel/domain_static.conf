    server {
        listen                     127.0.0.1:8001 http2 ssl proxy_protocol;
        client_max_body_size 512m;
        set_real_ip_from           127.0.0.1;
        real_ip_header             proxy_protocol;

        # 填 SSL 证书中包含的域名，建议将域名指向服务端的 IP，多个域名以空格分隔
        server_name                {domain};

        ssl_certificate            cert/{cert_name}.pem;
        ssl_certificate_key        cert/{cert_name}.key;

        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                TLS13_AES_128_GCM_SHA256:TLS13_AES_256_GCM_SHA384:TLS13_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers  on;

        ssl_stapling               on;
        ssl_stapling_verify        on;
        resolver                   1.1.1.1 valid=60s;
        resolver_timeout           2s;

        # 反向代理配置由 https://www.digitalocean.com/community/tools/nginx 生成
        location / {
            sub_filter                            $proxy_host $host;
            sub_filter_once                       off;

            # 使用本地文件
            root {static_root_path};
            index index.html;
            # 使用反向代理
            # set $website                          127.0.0.1:5555;
            # proxy_pass                            http://$website;
            resolver                              1.1.1.1;

            proxy_set_header Host                 $proxy_host;

            proxy_http_version                    1.1;
            proxy_cache_bypass                    $http_upgrade;

            proxy_ssl_server_name                 on;

            proxy_set_header Upgrade              $http_upgrade;
            proxy_set_header Connection           $connection_upgrade;
            proxy_set_header X-Real-IP            $proxy_protocol_addr;
            proxy_set_header Forwarded            $proxy_add_forwarded;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    $scheme;
            proxy_set_header X-Forwarded-Host     $host;
            proxy_set_header X-Forwarded-Port     $server_port;
            add_header 'X-Content-Type-Options' nosniff;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

            proxy_connect_timeout                 60s;
            proxy_send_timeout                    60s;
            proxy_read_timeout                    60s;
        }
    }