<!doctype html>
<html lang="zh-CN" data-server-theme="__MMW_DEFAULT_THEME__">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f6f8" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <title>RelayDock Console</title>
    <script>
      (() => {
        const saved = localStorage.getItem("arcway-theme");
        const followsSystem = !saved || saved === "system";
        const dark = saved === "dark" || (followsSystem && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        const serverStyle = document.documentElement.dataset.serverTheme;
        document.documentElement.dataset.styleTheme = ["flat", "pixel", "anime"].includes(serverStyle) ? serverStyle : "flat";
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-CEuiZ6OJ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CneBdwuQ.css">
