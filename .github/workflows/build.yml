name: Backend CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify embedded frontend snapshot
        run: |
          test -s internal/web/dist/index.html
          test -n "$(find internal/web/dist/assets -type f -print -quit)"

      - name: Verify modules
        run: go mod verify

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build -trimpath -o /tmp/arcway ./cmd/server

  build:
    name: Build ${{ matrix.output }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: arcway-linux-amd64
          - goos: linux
            goarch: arm64
            output: arcway-linux-arm64
          - goos: darwin
            goarch: amd64
            output: arcway-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: arcway-darwin-arm64
          - goos: windows
            goarch: amd64
            output: arcway-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o build/${{ matrix.output }} ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          if-no-files-found: error
          retention-days: 7

  guard:
    name: Build expiry guard (${{ matrix.goarch }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o build/arcway-expiry-guard-linux-${{ matrix.goarch }} ./cmd/arcway-expiry-guard

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: arcway-expiry-guard-linux-${{ matrix.goarch }}
          path: build/arcway-expiry-guard-linux-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/violetaini/relaydock
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: [build, guard]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Prepare checksums
        run: |
          chmod +x release/arcway-linux-* release/arcway-darwin-*
          cd release
          sha256sum arcway-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/arcway-*
            release/checksums.txt
